name: Create Virtual Service from Jira Story

# ---------------------------------------------------------------------------
# Triggered manually with a Jira ticket number, or automatically on push
# when the commit message contains a Jira-style ticket ID (e.g. PROJ-123).
# ---------------------------------------------------------------------------
on:
  workflow_dispatch:
    inputs:
      jira_ticket:
        description: 'Jira ticket number (e.g., PROJ-123)'
        required: true
        type: string
      dry_run:
        description: 'Dry run — plan only, do not deploy the virtual service'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main

# Minimal token permissions — this workflow only needs to upload artifacts.
permissions:
  contents: read
  actions: write

jobs:
  create-virtual-service:
    name: Read Jira Story → Create Virtual Service
    # -----------------------------------------------------------------------
    # IMPORTANT: this job must run on the self-hosted runner that has
    # Parasoft Virtualize (and its MCP Server) running locally.
    # Register your runner under Settings → Actions → Runners and replace
    # the label below with any additional labels you assigned to it.
    # -----------------------------------------------------------------------
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Resolve the Jira ticket — from workflow_dispatch input, or by
      # extracting a Jira-style key (e.g. PROJ-123) from the commit message.
      # The step exits early (skipping the rest of the job) if no ticket is
      # found on a push event.
      # -----------------------------------------------------------------------
      - name: Resolve Jira ticket
        id: resolve_ticket
        run: |
          if [ -n "${{ inputs.jira_ticket }}" ]; then
            TICKET="${{ inputs.jira_ticket }}"
          else
            TICKET=$(echo "${{ github.event.head_commit.message }}" | grep -oE '\b[A-Z]{2,10}-[0-9]+\b' | head -1)
          fi
          if [ -z "$TICKET" ]; then
            echo "No Jira ticket found in commit message — skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "ticket=$TICKET" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # -----------------------------------------------------------------------
      # Install GitHub Copilot CLI
      # -----------------------------------------------------------------------
      - name: Set up Node.js
        if: steps.resolve_ticket.outputs.skip != 'true'
        uses: actions/setup-node@v4

      - name: Install Copilot CLI
        if: steps.resolve_ticket.outputs.skip != 'true'
        run: npm install -g @github/copilot

      # -----------------------------------------------------------------------
      # Write the MCP server configuration for Copilot CLI.
      # Copilot CLI reads MCP servers from ~/.copilot/mcp-config.json.
      # Both secrets are pre-computed base64(user:token) strings.
      # -----------------------------------------------------------------------
      - name: Configure MCP servers
        if: steps.resolve_ticket.outputs.skip != 'true'
        env:
          ATLASSIAN_BASIC_AUTH: ${{ secrets.ATLASSIAN_BASIC_AUTH }}
          VIRTUALIZE_AUTH_TOKEN: ${{ secrets.VIRTUALIZE_AUTH_TOKEN }}
          VIRTUALIZE_MCP_URL: ${{ secrets.VIRTUALIZE_MCP_URL }}
        shell: bash
        run: |
          mkdir -p ~/.copilot
          cat > ~/.copilot/mcp-config.json <<EOF
          {
            "mcpServers": {
              "jira-remote": {
                "type": "http",
                "url": "https://mcp.atlassian.com/v1/mcp",
                "headers": {
                  "Authorization": "Basic ${ATLASSIAN_BASIC_AUTH}"
                },
                "tools": ["*"]
              },
              "virtualize": {
                "type": "http",
                "url": "${VIRTUALIZE_MCP_URL}",
                "headers": {
                  "Authorization": "Basic ${VIRTUALIZE_AUTH_TOKEN}"
                },
                "tools": ["*"]
              }
            }
          }
          EOF

      # -----------------------------------------------------------------------
      # Run the Copilot CLI agent in programmatic mode.
      # --allow-tool='mcp(*)' permits all MCP tool calls.
      # --no-ask-user prevents interactive prompts in CI.
      # -s (silent) suppresses session metadata; clean output goes to the log.
      # --share writes the full session transcript to agent-output.md.
      # -----------------------------------------------------------------------
      - name: Run Copilot Agent
        if: steps.resolve_ticket.outputs.skip != 'true'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          PROMPT="Jira ticket: ${{ steps.resolve_ticket.outputs.ticket }}. Dry run: ${DRY_RUN}.

          You are an expert DevOps automation engineer with deep knowledge of both
          Atlassian Jira and Parasoft Virtualize.

          Your task:
          1. Use the jira-remote MCP tools to read the Jira user story for the ticket above.
          2. Analyze the story to extract all virtual service requirements: endpoint path,
             HTTP method(s), request/response schema, port, and any behavior rules.
          3. Use the virtualize MCP tools to create and deploy a virtual service that
             satisfies those requirements.
          4. Report a concise summary of what was created (service name, endpoint, port).

          Guidelines:
          - If information is missing from the Jira story, make reasonable defaults and
            note them in your final summary.
          - If Dry run is true, describe what you would create but do not call any
            Virtualize write or deploy tools.
          - Always confirm successful deployment before finishing."

          copilot -p "$PROMPT" \
            --allow-tool='mcp(*)' \
            --no-ask-user \
            --share='./agent-output.md'

      # -----------------------------------------------------------------------
      # Persist the Copilot session transcript as a workflow artifact.
      # -----------------------------------------------------------------------
      - name: Upload agent output artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-output-${{ github.run_number }}
          path: agent-output.md
          if-no-files-found: ignore
          retention-days: 30
