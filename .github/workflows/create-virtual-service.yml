name: Create Virtual Service from Jira Story

# ---------------------------------------------------------------------------
# Triggered manually with a Jira ticket number, or automatically on push
# when the commit message contains a Jira-style ticket ID (e.g. PROJ-123).
# ---------------------------------------------------------------------------
on:
  workflow_dispatch:
    inputs:
      jira_ticket:
        description: 'Jira ticket number (e.g., PROJ-123)'
        required: true
        type: string
      dry_run:
        description: 'Dry run — plan only, do not deploy the virtual service'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main

# Minimal token permissions — read-only access to checkout the repository.
permissions:
  contents: read

jobs:
  create-virtual-service:
    name: Read Jira Story → Create Virtual Service
    # -----------------------------------------------------------------------
    # IMPORTANT: this job must run on the self-hosted runner that has
    # Parasoft Virtualize (and its MCP Server) running locally.
    # Register your runner under Settings → Actions → Runners and replace
    # the label below with any additional labels you assigned to it.
    # -----------------------------------------------------------------------
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # -----------------------------------------------------------------------
      # Resolve the Jira ticket — from workflow_dispatch input, or by
      # extracting a Jira-style key (e.g. PROJ-123) from the commit message.
      # The step exits early (skipping the rest of the job) if no ticket is
      # found on a push event.
      # -----------------------------------------------------------------------
      - name: Resolve Jira ticket
        id: resolve_ticket
        shell: powershell
        run: |
          $ticket = "${{ inputs.jira_ticket }}"
          if (-not $ticket) {
            $commitMsg = "${{ github.event.head_commit.message }}"
            $match = [regex]::Match($commitMsg, '\b[A-Z]{2,10}-\d+\b')
            $ticket = if ($match.Success) { $match.Value } else { "" }
          }
          if (-not $ticket) {
            Write-Host "No Jira ticket found in commit message - skipping."
            "skip=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            Write-Host "Resolved ticket: $ticket"
            "ticket=$ticket" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "skip=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      # -----------------------------------------------------------------------
      # Install GitHub Copilot CLI
      # -----------------------------------------------------------------------
      - name: Set up Node.js
        if: steps.resolve_ticket.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Copilot CLI
        if: steps.resolve_ticket.outputs.skip != 'true'
        shell: powershell
        run: npm install -g @github/copilot

      # -----------------------------------------------------------------------
      # Write the MCP server configuration for Copilot CLI.
      # Copilot CLI reads MCP servers from ~/.copilot/mcp-config.json.
      # Both secrets are pre-computed base64(user:token) strings.
      # -----------------------------------------------------------------------
      - name: Configure MCP servers
        if: steps.resolve_ticket.outputs.skip != 'true'
        shell: powershell
        env:
          ATLASSIAN_BASIC_AUTH: ${{ secrets.ATLASSIAN_BASIC_AUTH }}
          VIRTUALIZE_AUTH_TOKEN: ${{ secrets.VIRTUALIZE_AUTH_TOKEN }}
          VIRTUALIZE_MCP_URL: ${{ secrets.VIRTUALIZE_MCP_URL }}
        run: |
          $configDir = "$env:USERPROFILE\.copilot"
          New-Item -ItemType Directory -Force -Path $configDir | Out-Null
          $config = [ordered]@{
            mcpServers = [ordered]@{
              'jira-remote' = [ordered]@{
                type    = 'http'
                url     = 'https://mcp.atlassian.com/v1/mcp'
                headers = @{ Authorization = "Basic $env:ATLASSIAN_BASIC_AUTH" }
                env     = @{ ATLASSIAN_BASE_URL = 'https://parasoft-demo.atlassian.net' }
              }
              virtualize = [ordered]@{
                type    = 'http'
                url     = $env:VIRTUALIZE_MCP_URL
                headers = @{ Authorization = "Basic $env:VIRTUALIZE_AUTH_TOKEN" }
              }
            }
          }
          $config | ConvertTo-Json -Depth 10 | Set-Content "$configDir\mcp-config.json" -Encoding utf8
          Write-Host "--- mcp-config.json written ---"
          $written = Get-Content "$configDir\mcp-config.json" | ConvertFrom-Json
          Write-Host "jira-remote url: $($written.mcpServers.'jira-remote'.url)"
          Write-Host "virtualize url:  $($written.mcpServers.virtualize.url)"
          if (-not $written.mcpServers.virtualize.url) {
            Write-Error "VIRTUALIZE_MCP_URL is empty - check that the secret is set."
            exit 1
          }

      # -----------------------------------------------------------------------
      # Agent step 1: Read the Jira story, create and deploy the virtual
      # service via Virtualize MCP, and emit FULL_TEST_URL so the verification
      # step knows where the service is listening.
      # -----------------------------------------------------------------------
      - name: Run Copilot Agent - Create Virtual Service from Jira Story
        id: create_vs
        if: steps.resolve_ticket.outputs.skip != 'true'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        shell: powershell
        run: |
          $ticket = "${{ steps.resolve_ticket.outputs.ticket }}"
          $dryRun = "${{ inputs.dry_run }}"
          if (-not $dryRun) { $dryRun = "false" }
          $prompt = @"
          Jira ticket: $ticket. Dry run: $dryRun.

          You are an expert DevOps automation engineer with deep knowledge of both
          Atlassian Jira and Parasoft Virtualize.

          IMPORTANT:
          You must always use the following when calling jira-remote tools:
            - cloudId: parasoft-demo.atlassian.net
          Never attempt to derive or guess the cloudId from usernames, emails, or URLs.
          
          IMPORTANT:
          The Virtualize MCP tools for creating virtual services require a deployment parameter.
          This parameter is an additional url path segment prefix that the virtual service 
          will listen on that is independent from the expected request URL the virtual service
          is simulating. It is often used to segment virtual services by team, project, client 
          application, or any other logical grouping. If a high confidence value for the 
          deployment parameter cannot be inferred from the Jira story, use the name of this 
          repository as a reasonable default.

          IMPORTANT:
          The Virtualize MCP tools for creating virtual services require a deployment port. If 
          a high confidence port number cannot be inferred from the Jira story, use 38000 as
          a reasonable default.

          IMPORTANT:
          If the Virtualize MCP tools for creating virtual services report that the virtual service
          name or deployment port are already in use, instruct the tools with unique values so that
          a new virtual service will be created successfully. Do not accept that a virtual service
          already exists as a valid outcome for this task.

          Your task:
          1. Use the jira-remote MCP tools to read the Jira user story for the ticket above.
          2. Analyze the story to extract all virtual service requirements: endpoint path,
             HTTP method(s), request/response schema, port, and any behavior rules.
          3. Use the virtualize MCP tools to create and deploy a virtual service that
             satisfies those requirements.
          4. Report a concise summary of what was created (service name, endpoint, port).
          5. At the very end of your response output these lines in this exact format:
             ENDPOINT_URL=http://hostname:port
             TEST_METHOD=POST
             FULL_TEST_URL=http://hostname:port/deployment/full/path?param=value
             Where:
             - ENDPOINT_URL is the base URL only (scheme, host, port), no trailing slash or path.
             - TEST_METHOD is the HTTP method to use for a representative sanity test call.
             - FULL_TEST_URL is the complete URL for a representative sanity test call,
               including the deployment prefix, the full endpoint path, and representative
               query parameters from the Jira story. This must be a URL that the deployed
               virtual service will respond to with HTTP 200.
             Omit all three lines if Dry run is true.

          Guidelines:
          - If information is missing from the Jira story, make reasonable defaults and
            note them in your final summary.
          - If Dry run is true, describe what you would create but do not call any
            Virtualize write or deploy tools.
          - Always confirm successful deployment before finishing.
          "@
          $ErrorActionPreference = 'Continue'
          $output = copilot -p $prompt `
            --yolo `
            --no-ask-user
          $copilotExit = $LASTEXITCODE
          $output
          if ($copilotExit -ne 0) {
            Write-Error "Copilot CLI exited with code $copilotExit. See output above for details."
            exit $copilotExit
          }
          $testMethodLine = $output | Where-Object { $_ -match '^TEST_METHOD=' }
          $fullTestUrlLine = $output | Where-Object { $_ -match '^FULL_TEST_URL=' }
          if (-not $fullTestUrlLine) {
            Write-Host "No FULL_TEST_URL found in agent output - verification step will be skipped."
          }
          if ($testMethodLine) {
            $testMethod = ($testMethodLine -replace '^TEST_METHOD=', '').Trim()
            Write-Host "Captured test method: $testMethod"
            "test_method=$testMethod" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }
          if ($fullTestUrlLine) {
            $fullTestUrl = ($fullTestUrlLine -replace '^FULL_TEST_URL=', '').Trim()
            Write-Host "Captured full test URL: $fullTestUrl"
            "full_test_url=$fullTestUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      # -----------------------------------------------------------------------
      # Verification step: make the actual HTTP call and assert HTTP 200.
      # Uses the full test URL emitted by the create step — no separate
      # agent invocation needed.
      # -----------------------------------------------------------------------
      - name: Verify Virtual Service Returns HTTP 200
        if: steps.resolve_ticket.outputs.skip != 'true' && inputs.dry_run != 'true' && steps.create_vs.outputs.full_test_url != ''
        shell: powershell
        run: |
          $fullUrl    = "${{ steps.create_vs.outputs.full_test_url }}"
          $testMethod = "${{ steps.create_vs.outputs.test_method }}"
          if (-not $testMethod) { $testMethod = 'GET' }
          Write-Host "Sending $testMethod $fullUrl"
          $params = @{
            Uri             = $fullUrl
            Method          = $testMethod
            UseBasicParsing = $true
          }
          try {
            $response = Invoke-WebRequest @params -ErrorAction Stop
            Write-Host "Response status: $($response.StatusCode)"
            if ($response.StatusCode -eq 200) {
              Write-Host "PASS: Virtual service returned HTTP 200."
            } else {
              Write-Error "FAIL: Expected 200 but received $($response.StatusCode)."
              exit 1
            }
          } catch {
            Write-Error "FAIL: HTTP request threw an exception - $_"
            exit 1
          }
