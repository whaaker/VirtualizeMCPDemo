name: Create Virtual Service from Jira Story

# ---------------------------------------------------------------------------
# Triggered manually with a Jira ticket number, or automatically on push
# when the commit message contains a Jira-style ticket ID (e.g. PROJ-123).
# ---------------------------------------------------------------------------
on:
  workflow_dispatch:
    inputs:
      jira_ticket:
        description: 'Jira ticket number (e.g., PROJ-123)'
        required: true
        type: string
      dry_run:
        description: 'Dry run — plan only, do not deploy the virtual service'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main

# Minimal token permissions — this workflow only needs to upload artifacts.
permissions:
  contents: read
  actions: write

jobs:
  create-virtual-service:
    name: Read Jira Story → Create Virtual Service
    # -----------------------------------------------------------------------
    # IMPORTANT: this job must run on the self-hosted runner that has
    # Parasoft Virtualize (and its MCP Server) running locally.
    # Register your runner under Settings → Actions → Runners and replace
    # the label below with any additional labels you assigned to it.
    # -----------------------------------------------------------------------
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # -----------------------------------------------------------------------
      # Resolve the Jira ticket — from workflow_dispatch input, or by
      # extracting a Jira-style key (e.g. PROJ-123) from the commit message.
      # The step exits early (skipping the rest of the job) if no ticket is
      # found on a push event.
      # -----------------------------------------------------------------------
      - name: Resolve Jira ticket
        id: resolve_ticket
        shell: powershell
        run: |
          $ticket = "${{ inputs.jira_ticket }}"
          if (-not $ticket) {
            $commitMsg = "${{ github.event.head_commit.message }}"
            $match = [regex]::Match($commitMsg, '\b[A-Z]{2,10}-\d+\b')
            $ticket = if ($match.Success) { $match.Value } else { "" }
          }
          if (-not $ticket) {
            Write-Host "No Jira ticket found in commit message - skipping."
            "skip=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            Write-Host "Resolved ticket: $ticket"
            "ticket=$ticket" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "skip=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      # -----------------------------------------------------------------------
      # Install GitHub Copilot CLI
      # -----------------------------------------------------------------------
      - name: Set up Node.js
        if: steps.resolve_ticket.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Copilot CLI
        if: steps.resolve_ticket.outputs.skip != 'true'
        shell: powershell
        run: npm install -g @github/copilot

      # -----------------------------------------------------------------------
      # Write the MCP server configuration for Copilot CLI.
      # Copilot CLI reads MCP servers from ~/.copilot/mcp-config.json.
      # Both secrets are pre-computed base64(user:token) strings.
      # -----------------------------------------------------------------------
      - name: Configure MCP servers
        if: steps.resolve_ticket.outputs.skip != 'true'
        shell: powershell
        env:
          ATLASSIAN_BASIC_AUTH: ${{ secrets.ATLASSIAN_BASIC_AUTH }}
          VIRTUALIZE_AUTH_TOKEN: ${{ secrets.VIRTUALIZE_AUTH_TOKEN }}
          VIRTUALIZE_MCP_URL: ${{ secrets.VIRTUALIZE_MCP_URL }}
        run: |
          $configDir = "$env:USERPROFILE\.copilot"
          New-Item -ItemType Directory -Force -Path $configDir | Out-Null
          $config = [ordered]@{
            mcpServers = [ordered]@{
              'jira-remote' = [ordered]@{
                type    = 'http'
                url     = 'https://mcp.atlassian.com/v1/mcp'
                headers = @{ Authorization = "Basic $env:ATLASSIAN_BASIC_AUTH" }
                env     = @{ ATLASSIAN_BASE_URL = 'https://parasoft-demo.atlassian.net' }
              }
              virtualize = [ordered]@{
                type    = 'http'
                url     = $env:VIRTUALIZE_MCP_URL
                headers = @{ Authorization = "Basic $env:VIRTUALIZE_AUTH_TOKEN" }
              }
            }
          }
          $config | ConvertTo-Json -Depth 10 | Set-Content "$configDir\mcp-config.json" -Encoding utf8
          Write-Host "--- mcp-config.json written ---"
          $written = Get-Content "$configDir\mcp-config.json" | ConvertFrom-Json
          Write-Host "jira-remote url: $($written.mcpServers.'jira-remote'.url)"
          Write-Host "virtualize url:  $($written.mcpServers.virtualize.url)"
          if (-not $written.mcpServers.virtualize.url) {
            Write-Error "VIRTUALIZE_MCP_URL is empty - check that the secret is set."
            exit 1
          }

      # -----------------------------------------------------------------------
      # Write the Virtualize TLS certificate so Node.js (Copilot CLI) trusts it.
      # VIRTUALIZE_TLS_CERT is the base64-encoded DER certificate exported from
      # the Virtualize HTTPS endpoint.
      # -----------------------------------------------------------------------
      - name: Write Virtualize TLS certificate
        id: write_virtualize_cert
        if: steps.resolve_ticket.outputs.skip != 'true'
        shell: powershell
        env:
          VIRTUALIZE_TLS_CERT: ${{ secrets.VIRTUALIZE_TLS_CERT }}
        run: |
          $certDir = "$env:TEMP\virtualize-certs"
          New-Item -ItemType Directory -Force -Path $certDir | Out-Null
          $certBytes = [Convert]::FromBase64String($env:VIRTUALIZE_TLS_CERT)
          [IO.File]::WriteAllBytes("$certDir\virtualize.cer", $certBytes)
          Write-Host "Virtualize TLS cert written to $certDir\virtualize.cer"
          "VIRTUALIZE_CERT_PATH=$certDir\virtualize.cer" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      # -----------------------------------------------------------------------
      # Smoke-test Virtualize MCP server reachability before running the agent.
      # A 400 response is acceptable — it means the server is up but rejected
      # the plain POST body (expected for streamable-HTTP MCP servers).
      # 401/403 means bad credentials. 000/timeout means unreachable.
      # -----------------------------------------------------------------------
      - name: Verify Virtualize MCP server is reachable
        if: steps.resolve_ticket.outputs.skip != 'true'
        shell: powershell
        env:
          VIRTUALIZE_AUTH_TOKEN: ${{ secrets.VIRTUALIZE_AUTH_TOKEN }}
          VIRTUALIZE_MCP_URL: ${{ secrets.VIRTUALIZE_MCP_URL }}
        run: |
          Write-Host "Probing $env:VIRTUALIZE_MCP_URL ..."
          try {
            $resp = Invoke-WebRequest -Uri $env:VIRTUALIZE_MCP_URL `
              -Method GET `
              -Headers @{ Authorization = "Basic $env:VIRTUALIZE_AUTH_TOKEN" } `
              -UseBasicParsing `
              -ErrorAction Stop
            Write-Host "Response status: $($resp.StatusCode) - server is reachable."
          } catch {
            Write-Host "WARNING: probe exception: $($_.Exception.Message)"
            Write-Host "Continuing - Copilot CLI uses NODE_EXTRA_CA_CERTS for TLS trust, not .NET."
          }

      # -----------------------------------------------------------------------
      # Diagnostic: ask the agent to list all available MCP tools so we can
      # see exactly how Copilot CLI registers the virtualize server's tools.
      # Remove this step once the allow-tool pattern is confirmed working.
      # -----------------------------------------------------------------------
      - name: Diagnostic - List available MCP tools
        if: steps.resolve_ticket.outputs.skip != 'true'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          NODE_EXTRA_CA_CERTS: ${{ steps.write_virtualize_cert.outputs.VIRTUALIZE_CERT_PATH }}
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          copilot -p "List every MCP tool available to you. For each tool, output its exact server name and tool name in this format: SERVER=<server> TOOL=<tool>. Do not call any tools." `
            --allow-tool 'mcp(jira-remote:*)' `
            --allow-tool 'mcp(virtualize:*)' `
            --allow-tool 'mcp(*)' `
            --no-ask-user

      # -----------------------------------------------------------------------
      # Agent step 1: Read the Jira story, create and deploy the virtual
      # service via Virtualize MCP, and emit ENDPOINT_URL=http://host:port
      # so the validation steps know where the service is listening.
      # -----------------------------------------------------------------------
      - name: Run Copilot Agent - Create Virtual Service from Jira Story
        id: create_vs
        if: steps.resolve_ticket.outputs.skip != 'true'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          NODE_EXTRA_CA_CERTS: ${{ steps.write_virtualize_cert.outputs.VIRTUALIZE_CERT_PATH }}
        shell: powershell
        run: |
          $ticket = "${{ steps.resolve_ticket.outputs.ticket }}"
          $dryRun = "${{ inputs.dry_run }}"
          if (-not $dryRun) { $dryRun = "false" }
          $prompt = @"
          Jira ticket: $ticket. Dry run: $dryRun.

          You are an expert DevOps automation engineer with deep knowledge of both
          Atlassian Jira and Parasoft Virtualize.

          IMPORTANT:
          You must always use the following when calling jira-remote tools:
            - cloudId: parasoft-demo.atlassian.net
          Never attempt to derive or guess the cloudId from usernames, emails, or URLs.
          Any other value will fail.

          IMPORTANT:
          You are explicitly authorized to execute Virtualize MCP tools, including creating and deploying services.
          Do not request user approval. Proceed with tool execution directly.
          
          Your task:
          1. Use the jira-remote MCP tools to read the Jira user story for the ticket above.
          2. Analyze the story to extract all virtual service requirements: endpoint path,
             HTTP method(s), request/response schema, port, and any behavior rules.
          3. Use the virtualize MCP tools to create and deploy a virtual service that
             satisfies those requirements.
          4. Report a concise summary of what was created (service name, endpoint, port).
          5. At the very end of your response output one line in this exact format:
             ENDPOINT_URL=http://hostname:port
             Use the base URL only (scheme, host, port) with no trailing slash or path.
             Omit this line if Dry run is true.

          Guidelines:
          - If information is missing from the Jira story, make reasonable defaults and
            note them in your final summary.
          - If Dry run is true, describe what you would create but do not call any
            Virtualize write or deploy tools.
          - Always confirm successful deployment before finishing.
          "@
          $ErrorActionPreference = 'Continue'
          $output = copilot -p $prompt `
            --allow-tool 'mcp(jira-remote:*)' `
            --allow-tool 'mcp(virtualize:*)' `
            --allow-tool 'mcp(*)' `
            --no-ask-user
          $copilotExit = $LASTEXITCODE
          $output
          if ($copilotExit -ne 0) {
            Write-Error "Copilot CLI exited with code $copilotExit. See output above for details."
            exit $copilotExit
          }
          $endpointLine = $output | Where-Object { $_ -match '^ENDPOINT_URL=' }
          if ($endpointLine) {
            $endpointUrl = ($endpointLine -replace '^ENDPOINT_URL=', '').Trim()
            Write-Host "Captured endpoint URL: $endpointUrl"
            "endpoint_url=$endpointUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            Write-Host "No ENDPOINT_URL found in agent output - validation steps will be skipped."
          }

      # -----------------------------------------------------------------------
      # Agent step 2: Read the Jira story to determine what a valid test
      # request looks like, then emit structured TEST_METHOD / TEST_PATH /
      # TEST_BODY lines for the verification step below.
      # Skipped on dry runs or when no endpoint URL was captured.
      # -----------------------------------------------------------------------
      - name: Run Copilot Agent - Validate Virtual Service Deployment
        id: validate_vs
        if: steps.resolve_ticket.outputs.skip != 'true' && inputs.dry_run != 'true' && steps.create_vs.outputs.endpoint_url != ''
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          NODE_EXTRA_CA_CERTS: ${{ steps.write_virtualize_cert.outputs.VIRTUALIZE_CERT_PATH }}
        shell: powershell
        run: |
          $ticket      = "${{ steps.resolve_ticket.outputs.ticket }}"
          $endpointUrl = "${{ steps.create_vs.outputs.endpoint_url }}"
          $prompt = @"
          Jira ticket: $ticket. Virtual service base URL: $endpointUrl.

          You are a QA automation engineer preparing a sanity test for a freshly deployed
          Parasoft Virtualize virtual service.

          IMPORTANT:
          You must always use the following when calling jira-remote tools:
            - cloudId: parasoft-demo.atlassian.net
          Never attempt to derive or guess the cloudId from usernames, emails, or URLs.
          Any other value will fail.
          
          Your task:
          1. Use the jira-remote MCP tools to read the Jira user story for the ticket above.
          2. From the story, determine what a valid HTTP test request looks like:
             the HTTP method, the full path (not including host or port), any required
             request headers, and a representative request body for POST or PUT requests.
          3. At the very end of your response output these lines in this exact format:
             TEST_METHOD=GET
             TEST_PATH=/api/example/path
             TEST_BODY={"key":"value"}
             Omit TEST_BODY if the method does not require a body (GET, DELETE, HEAD).

          Guidelines:
          - Use only information from the Jira story to determine the request format.
          - Output the TEST_* lines as the very last lines of your response with no trailing text.
          - Do not call any Virtualize MCP tools in this step.
          "@
          $ErrorActionPreference = 'Continue'
          $output = copilot -p $prompt `
            --allow-tool 'mcp(jira-remote:*)' `
            --no-ask-user
          $copilotExit = $LASTEXITCODE
          $output
          if ($copilotExit -ne 0) {
            Write-Error "Copilot CLI exited with code $copilotExit. See output above for details."
            exit $copilotExit
          }
          $methodLine = $output | Where-Object { $_ -match '^TEST_METHOD=' }
          $pathLine   = $output | Where-Object { $_ -match '^TEST_PATH=' }
          $bodyLine   = $output | Where-Object { $_ -match '^TEST_BODY=' }
          if ($methodLine) {
            "test_method=$(($methodLine -replace '^TEST_METHOD=','').Trim())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }
          if ($pathLine) {
            "test_path=$(($pathLine -replace '^TEST_PATH=','').Trim())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }
          if ($bodyLine) {
            "test_body=$(($bodyLine -replace '^TEST_BODY=','').Trim())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      # -----------------------------------------------------------------------
      # Verification step: make the actual HTTP call and assert HTTP 200.
      # Uses the endpoint URL from the create step and the request details
      # extracted by the validate agent step above.
      # -----------------------------------------------------------------------
      - name: Verify Virtual Service Returns HTTP 200
        if: steps.resolve_ticket.outputs.skip != 'true' && inputs.dry_run != 'true' && steps.create_vs.outputs.endpoint_url != ''
        shell: powershell
        run: |
          $baseUrl    = "${{ steps.create_vs.outputs.endpoint_url }}"
          $testPath   = "${{ steps.validate_vs.outputs.test_path }}"
          $testMethod = "${{ steps.validate_vs.outputs.test_method }}"
          $testBody   = "${{ steps.validate_vs.outputs.test_body }}"
          if (-not $testMethod) { $testMethod = 'GET' }
          $fullUrl = "$baseUrl$testPath"
          Write-Host "Sending $testMethod $fullUrl"
          $params = @{
            Uri             = $fullUrl
            Method          = $testMethod
            UseBasicParsing = $true
          }
          if ($testBody) {
            $params.Body        = $testBody
            $params.ContentType = 'application/json'
          }
          try {
            $response = Invoke-WebRequest @params -ErrorAction Stop
            Write-Host "Response status: $($response.StatusCode)"
            if ($response.StatusCode -eq 200) {
              Write-Host "PASS: Virtual service returned HTTP 200."
            } else {
              Write-Error "FAIL: Expected 200 but received $($response.StatusCode)."
              exit 1
            }
          } catch {
            Write-Error "FAIL: HTTP request threw an exception - $_"
            exit 1
          }
